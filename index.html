<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake Military Equipment Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; color: #ffffff; }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 0.95rem; }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .upload-area {
      border: 2px dashed #3a3d50;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: #6c63ff; background: #1e2035; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-text { color: #aaa; font-size: 0.9rem; }
    .upload-text span { color: #6c63ff; font-weight: 600; }

    #preview-container { display: none; margin-bottom: 20px; text-align: center; }
    #preview {
      max-width: 100%; max-height: 220px;
      border-radius: 10px; border: 1px solid #2a2d3e;
    }
    #filename { font-size: 0.8rem; color: #666; margin-top: 6px; }

    button {
      width: 100%; padding: 14px;
      background: #6c63ff; color: white;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #5a52e0; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #3a3a5c; cursor: not-allowed; }

    /* ── BIG RESULT BANNER ── */
    #result-banner {
      display: none;
      margin-top: 28px;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    #result-banner.real {
      background: linear-gradient(135deg, #0d2b1a, #1a4a2e);
      border: 2px solid #2ecc71;
      box-shadow: 0 0 24px rgba(46,204,113,0.3);
    }

    #result-banner.fake {
      background: linear-gradient(135deg, #2b0d0d, #4a1a1a);
      border: 2px solid #e74c3c;
      box-shadow: 0 0 24px rgba(231,76,60,0.3);
    }

    #result-icon { font-size: 4rem; margin-bottom: 12px; }

    #result-verdict {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .real #result-verdict { color: #2ecc71; }
    .fake #result-verdict { color: #e74c3c; }

    #result-subtitle { font-size: 1rem; color: #aaa; }

    /* ── LOADING ── */
    #loading { display: none; text-align: center; margin-top: 20px; color: #888; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #2a2d3e;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>🔍 Fake Military Equipment Detector</h1>
  <p class="subtitle">Upload an image to check if it's real or fake military equipment</p>

  <div class="card">

    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea"
         onclick="document.getElementById('imgInput').click()"
         ondragover="event.preventDefault(); this.style.borderColor='#6c63ff'"
         ondragleave="this.style.borderColor='#3a3d50'"
         ondrop="handleDrop(event)">
      <div class="upload-icon">📁</div>
      <p class="upload-text">Drag & drop or <span>browse file</span></p>
      <p class="upload-text" style="margin-top:6px; font-size:0.8rem;">
        JPG, PNG, BMP, WEBP supported
      </p>
      <input type="file" id="imgInput"
             accept=".jpg,.jpeg,.png,.bmp,.webp"
             onchange="handleFile(this)">
    </div>

    <!-- Image Preview -->
    <div id="preview-container">
      <img id="preview" src="" alt="Preview"/>
      <p id="filename"></p>
    </div>

    <!-- Check Button -->
    <button id="checkBtn" onclick="predict()" disabled>
      🔎 Check Image
    </button>

    <!-- Loading Spinner -->
    <div id="loading">
      <div class="spinner"></div>
      Analyzing image...
    </div>

    <!-- BIG RESULT BANNER -->
    <div id="result-banner">
      <div id="result-icon"></div>
      <div id="result-verdict"></div>
      <div id="result-subtitle"></div>
    </div>

  </div>

  <script>
    let selectedFile = null;

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('uploadArea').style.borderColor = '#3a3d50';
      const file = e.dataTransfer.files[0];
      if (file) loadPreview(file);
    }

    function handleFile(input) {
      if (input.files[0]) loadPreview(input.files[0]);
    }

    function loadPreview(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById("preview").src = e.target.result;
        document.getElementById("filename").textContent = file.name;
        document.getElementById("preview-container").style.display = "block";
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("result-banner").style.display = "none";
      };
      reader.readAsDataURL(file);
    }

    async function predict() {
      if (!selectedFile) return;

      document.getElementById("checkBtn").disabled = true;
      document.getElementById("loading").style.display = "block";
      document.getElementById("result-banner").style.display = "none";

      const form = new FormData();
      form.append("image", selectedFile);

      try {
        const res  = await fetch("/predict", { method: "POST", body: form });
        const data = await res.json();

        if (data.err) { alert("Server error: " + data.err); return; }

        const banner = document.getElementById("result-banner");
        const isFake = data.result === "FAKE";

        banner.className = isFake ? "fake" : "real";

        document.getElementById("result-icon").textContent    = isFake ? "⚠️" : "✅";
        document.getElementById("result-verdict").textContent = isFake ? "FAKE" : "REAL";
        document.getElementById("result-subtitle").textContent =
          isFake ? "This appears to be fake / decoy equipment"
                 : "This appears to be real military equipment";

        banner.style.display = "block";

      } catch (err) {
        alert("Something went wrong. Is the Flask server running?");
      } finally {
        document.getElementById("loading").style.display = "none";
        document.getElementById("checkBtn").disabled = false;
      }
    }
  </script>

</body>
</html>
